name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  server:
    name: Server — lint / typecheck / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: ./server
        run: bun install

      - name: Lint
        working-directory: ./server
        run: bun run lint

      - name: Typecheck
        working-directory: ./server
        run: bun run typecheck

      - name: Unit tests
        working-directory: ./server
        run: bunx jest --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: server/coverage

  client:
    name: Client — lint / typecheck / test / e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install client dependencies
        working-directory: ./client
        run: bun install

      - name: Lint
        working-directory: ./client
        run: bun run lint

      - name: Typecheck
        working-directory: ./client
        run: bun run typecheck

      - name: Unit tests
        working-directory: ./client
        run: bunx jest --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-client
          path: client/coverage

      - name: Install Playwright browsers
        working-directory: ./client
        run: bunx playwright install --with-deps chromium

      - name: Mock e2e tests
        working-directory: ./client
        env:
          MOCK_BRIDGE: "true"
        run: bunx playwright test

  build:
    name: Build — server + web client
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd server && bun install
          cd ../client && bun install

      - name: Build server
        working-directory: ./server
        run: bun run build

      - name: Build client for web
        working-directory: ./client
        run: bunx expo export -p web
