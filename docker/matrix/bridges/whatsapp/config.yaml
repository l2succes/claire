# mautrix-whatsapp Configuration for Claire
# Documentation: https://docs.mau.fi/bridges/go/whatsapp/config.html

homeserver:
    address: http://synapse:8008
    domain: claire.local

appservice:
    address: http://mautrix-whatsapp:29318
    hostname: 0.0.0.0
    port: 29318
    database:
        type: sqlite3-fk-wal
        uri: /data/mautrix-whatsapp.db
    id: whatsapp
    bot:
        username: whatsappbot
        displayname: WhatsApp Bridge Bot
        avatar: mxc://maunium.net/NeXNQarUbrlYBiPCpprYsRqr
    as_token: 15c581d944fdb469a5339345f3ff8d90550f19819a18a95c62ccf41e6947bfe6
    hs_token: 15c581d944fdb469a5339345f3ff8d90550f19819a18a95c62ccf41e6947bfe6

bridge:
    username_template: "_wa_{{.}}"
    displayname_template: "{{.Name}} (WA)"
    command_prefix: "!wa"

    permissions:
        "*": relay
        "claire.local": user
        "@claire_bot:claire.local": admin

    history_sync:
        max_initial_conversations: -1
        message_count: 500
        request_full_sync: true

    relay:
        enabled: false

    private_chat_portal_meta: true
    parallel_member_sync: true

    # Double puppeting: allows the bridge to act as the real Matrix user
    # so outgoing messages from the user's phone appear as their actual Matrix
    # account instead of a ghost user (@whatsapp_<phone>:claire.local).
    # Docs: https://docs.mau.fi/bridges/general/double-puppeting.html
    double_puppet:
        secrets:
            # Map of server_name -> homeserver as_token (prefixed with "as_token:")
            claire.local: "as_token:15c581d944fdb469a5339345f3ff8d90550f19819a18a95c62ccf41e6947bfe6"

logging:
    min_level: info
    writers:
        - type: stdout
          format: pretty-colored
