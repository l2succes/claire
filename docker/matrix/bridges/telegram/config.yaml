# mautrix-telegram Configuration for Claire
# Documentation: https://docs.mau.fi/bridges/python/telegram/config.html

homeserver:
    address: http://synapse:8008
    domain: claire.local

appservice:
    address: http://mautrix-telegram:29317
    hostname: 0.0.0.0
    port: 29317
    database:
        type: sqlite3-fk-wal
        uri: /data/mautrix-telegram.db
    id: telegram
    bot:
        username: telegrambot
        displayname: Telegram Bridge Bot
        avatar: mxc://maunium.net/tJCRmUyJDsgRNgqhOgoJMuOY
    as_token: 2c56eef57e69ac4430912b838e9124eca9ea1aaf036dcfabdb74857b2e8f8973
    hs_token: 2c56eef57e69ac4430912b838e9124eca9ea1aaf036dcfabdb74857b2e8f8973

telegram:
    # Get from https://my.telegram.org/apps
    api_id: YOUR_TELEGRAM_API_ID
    api_hash: YOUR_TELEGRAM_API_HASH
    # Optional: bot token for relay mode
    bot_token: ""

bridge:
    username_template: "_telegram_{{.}}"
    displayname_template: "{{.Name}} (TG)"
    command_prefix: "!tg"

    permissions:
        "*": relay
        "claire.local": user
        "@claire_bot:claire.local": admin

    relay_user_distinguishers: []
    animated_sticker:
        target: webp
        convert_from_webm: true

logging:
    min_level: info
    writers:
        - type: stdout
          format: pretty-colored
